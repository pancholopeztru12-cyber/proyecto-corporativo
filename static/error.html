<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/seguridad.js"></script>
    <meta charset="UTF-8">
    <title>Error en el Sistema</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f8f9fa; }
        .error-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #dc3545; }
        p { color: #6c757d; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>⚠️ Ups! Algo salió mal</h1>
        <p id="mensaje-error">Ha ocurrido un error inesperado o no tienes permisos para acceder a esta sección.</p>
        <a href="/login.html" class="btn">Volver al Login</a>
    </div>
</body>
</html>
