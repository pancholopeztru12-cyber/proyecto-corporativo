<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Permisos por Perfil</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="breadcrumb">Seguridad > <b>Permisos-Perfil</b></div>
    <h2>Asignación de Permisos</h2>

    <div class="container">
        <aside id="menu-lateral">
            <h3>Menú</h3>
            <ul id="lista-menu"></ul>
            <hr>
            <button onclick="localStorage.clear(); location.href='/login.html'" style="width:100%">Salir</button>
        </aside>

        <main class="content">
            <div id="formulario">
                <h3 id="titulo-form">Asignar Nuevos Permisos</h3>
                <input type="hidden" id="permiso_id"> 
                
                <div class="form-group">
                    <div>
                        <label>Perfil:</label>
                        <select id="select_perfil"><option value="">Seleccione Perfil</option></select>
                    </div>
                    <div>
                        <label>Módulo:</label>
                        <select id="select_modulo"><option value="">Seleccione Módulo</option></select>
                    </div>
                </div>

                <div class="form-group" style="display: block;">
                    <label><b>Acciones Permitidas:</b></label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="bit_agregar"> Agregar</label>
                        <label><input type="checkbox" id="bit_editar"> Editar</label>
                        <label><input type="checkbox" id="bit_eliminar"> Eliminar</label>
                        <label><input type="checkbox" id="bit_consulta"> Consultar</label>
                        <label><input type="checkbox" id="bit_detalle"> Detalle</label>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <button id="btn-guardar" class="btn-guardar" onclick="guardarPermiso()">Guardar Permisos</button>
                    <button class="btn-eliminar" style="background: #64748b !important; color: white !important; border: none !important; padding: 12px 20px !important;" onclick="limpiarFormulario()">Cancelar / Limpiar</button>
                </div>
            </div>

            <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border);">

            <h3>Lista de Permisos Asignados</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Perfil</th>
                        <th>Módulo</th>
                        <th>Add</th>
                        <th>Edit</th>
                        <th>Del</th>
                        <th>Con</th>
                        <th>Det</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaPermisos"></tbody>
            </table>

            <div class="pagination">
                <button onclick="cambiarPagina(-1)">Anterior</button>
                <span id="infoPagina">Página 1</span>
                <button onclick="cambiarPagina(1)">Siguiente</button>
            </div>
        </main>
    </div>

    <script src="/js/crud_permisos.js"></script>
</body>
</html>
