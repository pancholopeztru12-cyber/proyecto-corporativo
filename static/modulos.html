<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/seguridad.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="top-header">
        <div class="breadcrumb">Seguridad > <b>Módulos</b></div>
        <div class="user-welcome">
            👋 Bienvenido: <span id="nombre-usuario-nav">...</span>
        </div>
    </div>

    <div class="container">
        <aside id="menu-lateral">
            <h3>Menú</h3>
            <ul id="lista-menu"></ul>
            <hr>
            <button onclick="localStorage.clear(); location.href='/login.html'" style="width:100%">Salir</button>
        </aside>

        <main class="content">
            <h2>Catálogo de Módulos</h2>
            
            <div style="margin-bottom: 20px;">
                <button class="btn-guardar" onclick="cargarModulos()" style="background: #4f46e5; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    🔄 Recargar Módulos
                </button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre del Módulo</th>
                        <th>Ruta</th> </tr>
                </thead>
                <tbody id="tablaModulos">
                    </tbody>
            </table>
        </main>
    </div>

    <script src="/js/modulos.js"></script>
</body>
</html>
